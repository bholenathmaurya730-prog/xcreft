    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-panel {
            background: rgba(17, 19, 24, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(157, 226, 255, 0.1);
            box-shadow: inset 0 0 20px rgba(0, 204, 255, 0.05);
        }

        .neon-glow {
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.3), inset 0 0 5px rgba(0, 204, 255, 0.2);
        }

        .kinetic-border {
            position: relative;
            overflow: hidden;
        }

        .kinetic-border::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #00ccff, transparent);
            animation: scanline 3s linear infinite;
        }

        @keyframes scanline {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }

        .floating-ui {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .hologram-founder {
            mask-image: linear-gradient(to bottom, black 50%, transparent 100%);
            mix-blend-mode: screen;
            filter: hue-rotate(180deg) brightness(0.8) contrast(1.2);
            opacity: 0.25;
        }

        .hex-button {
            clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%);
        }

        .scan-overlay {
            pointer-events: none;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));

            z-index: 100;

    <script>
        // Subtle mouse tracking for atmospheric depth
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;

            // Tilt the login card slightly
            const card = document.querySelector('.floating-ui');
            if (card) {
                const rotateX = (y - 0.5) * 10;
                const rotateY = (x - 0.5) * -10;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
            }
        });

        // Connection established interaction
        document.querySelector('form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Synchronizing...';
            btn.classList.add('scale-95');

            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Access Granted';
                btn.classList.remove('bg-primary-container');
                btn.classList.add('bg-green-500', 'text-white', 'scale-100');
            }, 1500);
        });
    </script>
